version: v1
plugins:
  - plugin: go
    out: ../../../sandbox/internal/envdapi
    opt: paths=source_relative
  - plugin: connect-go
    out: ../../../sandbox/internal/envdapi
    opt: paths=source_relative
managed:
  enabled: true
  optimize_for: SPEED
  go_package_prefix:
    default: github.com/sufy-dev/sufy/sandbox/internal/envdapi
